<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系 3D 互动模拟器 (少儿科普版 - 终极优化)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020208; color: white; font-family: "Microsoft YaHei", sans-serif; }
        
        /* 优化后的左下角控制面板 */
        #ui-container { 
            position: absolute; 
            bottom: 30px; 
            left: 30px; /* 移至左侧 */
            background: rgba(15, 15, 25, 0.85); 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid #4a5568; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 15px; /* 元素间距 */
            backdrop-filter: blur(5px);
        }
        
        .controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .label { 
            color: white; 
            font-size: 13px; 
            font-weight: bold;
            padding: 4px 8px; 
            background: rgba(10, 10, 20, 0.75); 
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 15px; 
            pointer-events: none; 
            text-shadow: 1px 1px 2px rgba(0,0,0,1);
            transition: opacity 0.3s;
        }
        
        button { 
            padding: 10px 20px; 
            cursor: pointer; 
            color: white; 
            border: none; 
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        #play-btn { background: #38a169; }
        #play-btn:hover { background: #2f855a; transform: scale(1.05); }
        
        #toggle-labels-btn { background: #3182ce; }
        #toggle-labels-btn:hover { background: #2b6cb0; transform: scale(1.05); }
        
        input[type=range] { vertical-align: middle; width: 140px; accent-color: #3182ce; cursor: pointer; }
        .tips { font-size: 12px; margin-top: 5px; color: #a0aec0; letter-spacing: 0.5px; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="controls-row">
            <button id="play-btn">暂停动画</button>
            <button id="toggle-labels-btn">隐藏名称</button>
        </div>
        <div class="controls-row">
            <label for="speed" style="font-size: 15px; font-weight: bold;">时间流逝速度: </label>
            <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1">
            <span id="speed-val" style="font-size: 15px; font-weight: bold; display: inline-block; width: 40px; color: #3182ce;">1.0x</span>
        </div>
        <div class="tips">🚀 鼠标左键拖拽旋转 🌍 | 右键平移 | 滚轮缩放 🔍</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ==========================================
        // 1. 初始化场景、相机和渲染器
        // ==========================================
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 90, 140);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxDistance = 350;

        // ==========================================
        // 2. 真实的光照系统 (凸显昼夜交替)
        // ==========================================
        const ambientLight = new THREE.AmbientLight(0x1a1a24, 0.4); 
        scene.add(ambientLight);
        
        const pointLight = new THREE.PointLight(0xffffee, 8.0, 0, 0.2);
        scene.add(pointLight);

        // 星空背景
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.8});
        const starsVertices = [];
        for(let i=0; i<2000; i++) {
            starsVertices.push(THREE.MathUtils.randFloatSpread(900), THREE.MathUtils.randFloatSpread(900), THREE.MathUtils.randFloatSpread(900));
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        scene.add(new THREE.Points(starsGeometry, starsMaterial));

        // ==========================================
        // 3. 更逼真的 Canvas 纹理生成算法
        // ==========================================
        function createRealisticTexture(name, baseColor, detailColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = baseColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (name === '水星' || name === '月球') {
                for (let i = 0; i < 150; i++) {
                    const r = Math.random() * 20 + 2;
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.beginPath(); ctx.arc(x-1, y-1, r*0.8, 0, Math.PI*2); ctx.fill();
                }
            } 
            else if (name === '地球') {
                ctx.fillStyle = detailColor;
                for (let i = 0; i < 40; i++) {
                    ctx.beginPath();
                    ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*80+20, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                for (let i = 0; i < 60; i++) {
                    ctx.beginPath();
                    ctx.ellipse(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*100+30, Math.random()*30+10, Math.random()*Math.PI, 0, Math.PI*2);
                    ctx.fill();
                }
            } 
            else if (name === '木星') {
                for (let i = 0; i < canvas.height; i += 4) {
                    ctx.fillStyle = Math.random() > 0.5 ? 'rgba(139,69,19,0.4)' : 'rgba(245,222,179,0.3)';
                    ctx.fillRect(0, i, canvas.width, Math.random() * 15 + 4);
                }
                ctx.fillStyle = '#9e3012';
                ctx.beginPath(); ctx.ellipse(600, 300, 60, 30, 0, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#7a1f07';
                ctx.beginPath(); ctx.ellipse(600, 300, 40, 15, 0, 0, Math.PI*2); ctx.fill();
            }
            else {
                for (let i = 0; i < 200; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.05)';
                    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*50, Math.random()*10);
                }
            }
            return new THREE.CanvasTexture(canvas);
        }

        // ==========================================
        // 4. 数据定义
        // ==========================================
        const planetData = [
            { name: '水星', baseColor: '#8c8c8c', detailColor: '#555555', radius: 1.3, distance: 18, speed: 0.035, selfSpeed: 0.005 },
            { name: '金星', baseColor: '#e3b873', detailColor: '#b37d32', radius: 2.0, distance: 28, speed: 0.025, selfSpeed: -0.002 },
            { name: '地球', baseColor: '#1a66ff', detailColor: '#2e8b57', radius: 2.3, distance: 40, speed: 0.018, selfSpeed: 0.03, hasMoon: true },
            { name: '火星', baseColor: '#cc4422', detailColor: '#7a2200', radius: 1.7, distance: 52, speed: 0.014, selfSpeed: 0.028 },
            { name: '木星', baseColor: '#d4a373', detailColor: '#a66a38', radius: 5.5, distance: 75, speed: 0.008, selfSpeed: 0.08 },
            { name: '土星', baseColor: '#e2ca99', detailColor: '#b3965d', radius: 4.5, distance: 98, speed: 0.006, selfSpeed: 0.07, hasRing: true },
            { name: '天王星', baseColor: '#a3e2f7', detailColor: '#70b5cc', radius: 3.2, distance: 120, speed: 0.004, selfSpeed: 0.04 },
            { name: '海王星', baseColor: '#2b4cb3', detailColor: '#172b7a', radius: 3.0, distance: 140, speed: 0.003, selfSpeed: 0.045 }
        ];

        // 太阳
        const sunTex = createRealisticTexture('太阳', '#ffaa00', '');
        const sunGeometry = new THREE.SphereGeometry(9, 64, 64);
        const sunMaterial = new THREE.MeshBasicMaterial({ map: sunTex });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);
        
        const sunDiv = document.createElement('div');
        sunDiv.className = 'label';
        sunDiv.style.color = '#ffcc00';
        sunDiv.textContent = '太阳';
        const sunLabel = new CSS2DObject(sunDiv);
        sunLabel.position.set(0, 11, 0);
        sun.add(sunLabel);

        // ==========================================
        // 5. 生成行星、星环与月球
        // ==========================================
        const planets = [];
        planetData.forEach(data => {
            const orbitGeometry = new THREE.RingGeometry(data.distance - 0.15, data.distance + 0.15, 128);
            const orbitMaterial = new THREE.MeshBasicMaterial({ color: 0x3e4a61, side: THREE.DoubleSide });
            const orbitLine = new THREE.Mesh(orbitGeometry, orbitMaterial);
            orbitLine.rotation.x = Math.PI / 2;
            scene.add(orbitLine);

            const orbitGroup = new THREE.Group();
            scene.add(orbitGroup);

            const geo = new THREE.SphereGeometry(data.radius, 64, 64);
            const texture = createRealisticTexture(data.name, data.baseColor, data.detailColor);
            
            const mat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.8, metalness: 0.1 });
            const mesh = new THREE.Mesh(geo, mat);
            orbitGroup.add(mesh);

            if(data.hasRing) {
                const ringGeo = new THREE.RingGeometry(data.radius * 1.3, data.radius * 2.3, 64);
                const ringCanvas = document.createElement('canvas');
                ringCanvas.width = 256; ringCanvas.height = 16;
                const rCtx = ringCanvas.getContext('2d');
                let gradient = rCtx.createLinearGradient(0, 0, ringCanvas.width, 0);
                gradient.addColorStop(0, 'rgba(226,202,153, 0.9)');
                gradient.addColorStop(0.5, 'rgba(0,0,0,0)');
                gradient.addColorStop(1, 'rgba(166,130,80, 0.3)');
                rCtx.fillStyle = gradient;
                rCtx.fillRect(0, 0, ringCanvas.width, ringCanvas.height);
                
                const ringMat = new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(ringCanvas), side: THREE.DoubleSide, transparent: true });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                mesh.add(ring);
            }

            const labelDiv = document.createElement('div');
            labelDiv.className = 'label';
            labelDiv.textContent = data.name;
            const label = new CSS2DObject(labelDiv);
            label.position.set(0, data.radius + 1.8, 0);
            orbitGroup.add(label);

            let moonOrbitGroup = null;
            let moonMesh = null;
            if (data.hasMoon) {
                moonOrbitGroup = new THREE.Group();
                const moonGeo = new THREE.SphereGeometry(0.6, 32, 32);
                const moonTex = createRealisticTexture('月球', '#a0a0a0', '');
                const moonMat = new THREE.MeshStandardMaterial({ map: moonTex, roughness: 0.9 });
                moonMesh = new THREE.Mesh(moonGeo, moonMat);
                
                moonMesh.position.set(data.radius + 2.5, 0, 0); 
                moonOrbitGroup.add(moonMesh);

                const mLabelDiv = document.createElement('div');
                mLabelDiv.className = 'label';
                mLabelDiv.textContent = '月球';
                mLabelDiv.style.fontSize = '10px';
                const mLabel = new CSS2DObject(mLabelDiv);
                mLabel.position.set(0, 1.2, 0);
                moonMesh.add(mLabel);

                const mOrbitLineGeo = new THREE.RingGeometry(data.radius + 2.45, data.radius + 2.55, 64);
                const mOrbitLineMat = new THREE.MeshBasicMaterial({ color: 0x555555, side: THREE.DoubleSide });
                const mOrbitLine = new THREE.Mesh(mOrbitLineGeo, mOrbitLineMat);
                mOrbitLine.rotation.x = Math.PI / 2;
                moonOrbitGroup.add(mOrbitLine);

                orbitGroup.add(moonOrbitGroup);
            }

            planets.push({ orbitGroup, mesh, data, angle: Math.random() * Math.PI * 2, moonOrbitGroup, moonMesh });
        });

        // ==========================================
        // 6. UI 交互与控制
        // ==========================================
        let isPlaying = true;
        let speedMultiplier = 1;
        let labelsVisible = true;

        // 播放/暂停控制
        document.getElementById('play-btn').addEventListener('click', (e) => {
            isPlaying = !isPlaying;
            e.target.innerText = isPlaying ? '暂停动画' : '播放动画';
            e.target.style.background = isPlaying ? '#38a169' : '#e53e3e';
        });

        // 显示/隐藏名称控制
        document.getElementById('toggle-labels-btn').addEventListener('click', (e) => {
            labelsVisible = !labelsVisible;
            e.target.innerText = labelsVisible ? '隐藏名称' : '显示名称';
            e.target.style.background = labelsVisible ? '#3182ce' : '#718096';
            // 直接控制整个 2D 文本渲染层容器的显示状态
            labelRenderer.domElement.style.display = labelsVisible ? 'block' : 'none';
        });

        // 速度滑块控制
        const speedSlider = document.getElementById('speed');
        const speedVal = document.getElementById('speed-val');
        speedSlider.addEventListener('input', (e) => {
            speedMultiplier = parseFloat(e.target.value);
            speedVal.innerText = speedMultiplier.toFixed(1) + 'x';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ==========================================
        // 7. 核心渲染与动力学循环
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            if (isPlaying) {
                sun.rotation.y += 0.002 * speedMultiplier;
                
                planets.forEach(p => {
                    p.angle += p.data.speed * speedMultiplier;
                    p.orbitGroup.position.x = Math.cos(p.angle) * p.data.distance;
                    p.orbitGroup.position.z = Math.sin(p.angle) * p.data.distance;
                    p.mesh.rotation.y += p.data.selfSpeed * speedMultiplier;

                    if (p.moonOrbitGroup) {
                        p.moonOrbitGroup.rotation.y += 0.05 * speedMultiplier;
                        p.moonMesh.rotation.y += 0.05 * speedMultiplier;
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
